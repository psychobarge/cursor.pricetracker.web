name: Daily crawl

on:
  schedule:
    # Runs hourly; first run of each Paris day crawls, subsequent runs skip (flag in crawl-meta.js).
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
    contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if already crawled today
        id: schedule
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(TZ=Europe/Paris date +%Y-%m-%d)
          LAST_DATE=$(grep -o '"lastCrawledAt":"[^"]*"' public/data/crawl-meta.js \
            | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}')
          if [ "$LAST_DATE" = "$TODAY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Already crawled today ($TODAY). Skipping."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "No crawl yet for $TODAY (last: $LAST_DATE). Running."
          fi

      - name: Setup Node.js
        if: steps.schedule.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run crawl
        if: steps.schedule.outputs.run == 'true'
        run: npm run crawl

      - name: Commit and push data
        if: steps.schedule.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.jsonl public/data/history.js public/data/crawl-meta.js public/index.html
          if git diff --staged --quiet; then
            echo "Warning: no staged changes after crawl. crawl-meta.js should always be updated."
            exit 1
          fi
          CRAWL_DATE=$(TZ=Europe/Paris date +%Y-%m-%dT%H:%M:%S%z)
          git commit -m "chore: crawl at ${CRAWL_DATE}"
          git push
