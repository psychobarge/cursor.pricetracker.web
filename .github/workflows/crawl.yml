name: Daily crawl

on:
  schedule:
    # Runs hourly at variable times; skip only after a successful crawl for the current Paris calendar day.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Run crawl even if already succeeded today (Paris)
        type: boolean
        default: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      run: ${{ steps.schedule.outputs.run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if already crawled today
        id: schedule
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" != "false" ]; then
            ARGS="--force"
          fi
          if node src/should-crawl-today.js $ARGS; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.schedule.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run crawl
        if: steps.schedule.outputs.run == 'true'
        run: npm run crawl

      - name: Commit and push data
        if: steps.schedule.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.jsonl public/data/history.js public/data/crawl-meta.js public/index.html
          if git diff --staged --quiet; then
            echo "Warning: no staged changes after crawl. crawl-meta.js should always be updated."
            exit 1
          fi
          CRAWL_DATE=$(TZ=Europe/Paris date +%Y-%m-%dT%H:%M:%S%z)
          git commit -m "chore: crawl at ${CRAWL_DATE}"
          git push

  deploy:
    needs: crawl
    if: needs.crawl.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
