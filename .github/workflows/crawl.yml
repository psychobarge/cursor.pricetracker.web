name: Daily crawl

on:
  schedule:
    # Hourly UTC; crawl runs only Mon/Thu at 11:00 Europe/Paris (handles DST).
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Check Paris schedule window
        id: schedule
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=Europe/Paris date +%H)
          DOW=$(TZ=Europe/Paris date +%u)
          if [ "$HOUR" = "11" ] && { [ "$DOW" = "1" ] || [ "$DOW" = "4" ]; }; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping crawl (Paris: day=$DOW hour=$HOUR; expected Mon/Thu at 11)."
          fi

      - name: Checkout
        if: steps.schedule.outputs.run == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.schedule.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run crawl
        if: steps.schedule.outputs.run == 'true'
        run: npm run crawl

      - name: Commit and push data
        if: steps.schedule.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.jsonl public/data/history.js
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update pricing snapshots"
          git push
